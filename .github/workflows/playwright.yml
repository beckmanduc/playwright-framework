name: Playwright Tests
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      test_scope:
        description: Select which tests to run
        required: true
        default: api
        type: choice
        options:
        - api
        - ui
        - all

permissions:
  contents: write
  pages: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_scope || 'all' }}
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      if: ${{ env.TEST_SCOPE == 'ui' || env.TEST_SCOPE == 'all' }}
      run: npx playwright install --with-deps

    - name: Get Allure history from gh-pages
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Copy previous Allure history
      run: |
        mkdir -p reports/allure-results/history
        if [ -d gh-pages/history ]; then
          cp -r gh-pages/history/* reports/allure-results/history/ || true
        fi

    - name: Run Playwright tests
      run: |
        echo "Running test scope: ${TEST_SCOPE}"
        case "${TEST_SCOPE}" in
          api)
            npm run test:api
            ;;
          ui)
            npx playwright test tests/search
            ;;
          all)
            npm run test
            ;;
          *)
            echo "Unsupported test scope: ${TEST_SCOPE}"
            exit 1
            ;;
        esac
      continue-on-error: true

    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npm run allure:generate

    - name: Deploy Allure Report to GitHub Pages
      if: ${{ !cancelled() && github.ref == 'refs/heads/master' }}
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: reports/allure-report
        keep_files: false

    - name: Upload Allure Report artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports/allure-report/
