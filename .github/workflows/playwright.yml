name: Playwright Tests
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Get Allure history from gh-pages
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Copy previous Allure history
      run: |
        mkdir -p allure-results/history
        if [ -d gh-pages/history ]; then
          cp -r gh-pages/history/* allure-results/history/ || true
        fi

    - name: Run Playwright tests
      run: npx playwright test --config=config/playwright.config.ts
      continue-on-error: true

    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npx allure generate allure-results --clean -o allure-report

    - name: Deploy Allure Report to GitHub Pages
      if: ${{ !cancelled() && github.ref == 'refs/heads/master' }}
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        keep_files: false

    - name: Upload Allure Report artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30
